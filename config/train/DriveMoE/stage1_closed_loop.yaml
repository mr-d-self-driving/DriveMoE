defaults:
  - _self_
hydra:
  run:
    dir: ${log_dir}
_target_: src.agent.drivemoe.train.DriveMoETrainAgent

log_dir: log/train/${name}/${now:%Y-%m-%d}_${now:%H-%M}_${seed}
name: drivemoe_stage1
device: cuda
n_nodes: 1
seed: 42
pretrained_model_path: ckpts/paligemma-3b-pt-224
load_pretrained_weights: True
resume_checkpoint_path:
train_vlm: True
action_expert_adaptive_mode:  # adaLN, adaLN-Zero, or None
use_torch_compile: True
use_bf16: True
use_amp: True
quantize: False
lora: False
lora_r: 32
lora_dropout: 0.0

data:
  train:
    statistics_path: config/statistics/b2d_statistics.json
    work_dir: exp/b2d_action
    split: train
    return_camera_id: True
    return_scenario_id: True
    is_drivemoe: True
    set_scene_priority: False
  val:
    statistics_path: config/statistics/b2d_statistics.json
    work_dir: exp/b2d_action
    split: val
    return_camera_id: False
    return_scenario_id: False
    is_drivemoe: True
    set_scene_priority: False

wandb:
  entity: ${oc.env:WANDB_ENTITY}
  project: drivemoe_stage1
  run: ${now:%H-%M-%S}_${name}

log_freq: 16
n_epochs: 12
n_updates: ${eval:'225348 // ${global_batch_size} * ${n_epochs}'}
save_model_freq: ${eval:'225348 // ${global_batch_size} * 1'}
eval_freq: 2000
eval_size: 1024
eval_thresholds: [0.05, 0.1, 0.2, 0.3, 0.5]

global_batch_size: 128
per_device_batch_size: 8
num_workers: 8
action_lr: 5e-5
vlm_lr: 5e-5
action_lr_scheduler:
  first_cycle_steps: 45000
  min_lr: 1e-8
  warmup_steps: 200
vlm_lr_scheduler:
  first_cycle_steps: 45000
  min_lr: 1e-8
  warmup_steps: 200
action_weight_decay: 0
vlm_weight_decay: 0
max_grad_norm: 1.0

flow_sampling: beta
num_inference_steps: 10
final_action_clip_value: 1.0

criterion:
  _target_: src.model.DriveMoE.loss.CombinedLoss
  camera_router_weight: 10.0
  action_router_weight: 10.0
  action_weight: 1.0
  gamma: 2.0  # used for Focal Loss

cond_steps: 5
horizon_steps: 10
action_dim: 2
proprio_dim: 10
max_seq_len: 788
tokenizer_padding: max_length
max_image_text_tokens: ${max_seq_len}
num_camera_views_selected: 5
num_scenario_selected: 7
stage: 1

mixture:
  vlm:   # gemma
    hidden_size: 2048
    intermediate_size: 16384
    use_final_norm: False
    cache: True
    use_quantize: ${quantize}
    use_lora: ${lora}
    adaptive_mode:  # not applicable for gemma
  proprio:
    hidden_size: 1024
    intermediate_size: 4096
    use_final_norm: True
    cache: True
    use_quantize: False
    use_lora: False
    adaptive_mode: ${action_expert_adaptive_mode}
  action:
    hidden_size: 1024
    intermediate_size: 4096
    use_final_norm: True
    cache: False
    use_quantize: False
    use_lora: False
    adaptive_mode: ${action_expert_adaptive_mode}
time_hidden_size: 256 # only applicable if using adaptive

# Fixed
image_token_index: 257152
vocab_size: 257216
pad_token_id: 0

vision:
  _target_: src.model.paligemma.siglip.SiglipVisionModel
  config:
    hidden_size: 1152
    intermediate_size: 4304
    num_hidden_layers: 27
    num_attention_heads: 16
    num_channels: 3
    image_size: 224
    patch_size: 14
    layer_norm_eps: 1e-6
    attention_dropout: 0.0
    num_image_tokens: 768
    lora:
      r: ${lora_r}
      dropout: ${lora_dropout}
  use_quantize: ${quantize}
  use_lora: ${lora}

vision_projector:
  _target_: src.model.paligemma.siglip.PaliGemmaMultiModalProjector
  config:
    vision_config:
      hidden_size: 1152
      projection_dim: 2048
    lora:
      r: ${lora_r}
      dropout: ${lora_dropout}
  use_quantize: ${quantize}
  use_lora: ${lora}

joint:
  _target_: src.model.DriveMoE.joint_model.JointModel
  config:
    action_expert_adaptive_mode: ${action_expert_adaptive_mode}
    time_hidden_size: ${time_hidden_size}
    mixture: ${mixture}
    lora:
      r: ${lora_r}
      dropout: ${lora_dropout}
    num_hidden_layers: 18
    num_attention_heads: 8
    num_key_value_heads: 1
    head_dim: 256
    max_position_embeddings: 8192
    rms_norm_eps: 1e-6
    rope_theta: 10000.0
    attention_bias: False
    attention_dropout: 0.0
    pad_token_id: ${pad_token_id}
    num_moe_layers: 4
    num_shared_experts: 1
    num_skill_experts: ${num_scenario_selected}
    num_experts_per_tok: 3